name: Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'publish-main' || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (push)
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.CI_AUTOFIX_SSH_KEY }}
      - name: Checkout (pull request)
        if: github.event_name != 'push'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Apply ruff auto-fixes
        id: autofix
        if: github.event_name == 'push'
        env:
          AUTOFIX_REF: ${{ github.ref }}
        run: .github/scripts/ci-autofix.sh
      - name: Abort current run after auto-fix push
        if: github.event_name == 'push' && steps.autofix.outputs.status == 'fix-pushed'
        run: |
          echo "ruff auto-fixes were applied and pushed; re-triggering publish."
          exit 1
      - run: ruff check
      - run: mypy src
      - run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]"

      - name: Compute version
        id: version
        run: |
          pip install setuptools-scm
          VERSION=$(python -m setuptools_scm)
          echo "Computed version: $VERSION"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            if [[ "$VERSION" == *".dev"* ]]; then
              echo "ERROR: dev version on tag build" >&2
              exit 1
            fi
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
          echo "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_PYCASTLE=$VERSION" >> "$GITHUB_ENV"

      - name: Build
        run: pip install build && python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.is_tag == 'false'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.is_tag == 'true'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
